.native-form input:focus, .native-form select:focus, .native-form textarea:focus { border-color: #ffd100; outline: none; }
.native-form button { background-color: #0d1f3c; color: #fff; padding: 15px 30px; border: none; border-radius: 4px; font-family: 'Inter', sans-serif; font-weight: 700; cursor: pointer; transition: background 0.3s; width: 100%; font-size: 1.1rem; }
.native-form button:hover { background-color: #ffd100; color: #0d1f3c; }
#form-message { display: none; margin-top: 15px; padding: 10px; border-radius: 4px; font-weight: 600; text-align: center; }
.success-msg { background: #d4edda; color: #155724; }
.error-msg { background: #f8d7da; color: #721c24; }
</style>
<form class="native-form" id="contact-form">
    <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required aria-required="true">
    </div>
    <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required aria-required="true">
    </div>
    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone">
    </div>
    <div class="form-group">
        <label for="service">Service Interested In</label>
        <select id="service" name="service">
            <option value="General Inquiry">General Inquiry</option>
            <option value="Business Cards">Custom Business Cards</option>
            <option value="Large Format Printing">Large Format Printing</option>
            <option value="Other Printed Products">Other Printed Products</option>
        </select>
    </div>
    <div class="form-group">
        <label for="message">Project Details *</label>
        <textarea id="message" name="message" rows="5" required aria-required="true"></textarea>
    </div>
    <button type="submit" id="submit-btn" aria-label="Submit Contact Form">Get a Free Quote</button>
    <div id="form-message" role="alert" aria-live="assertive"></div>
</form>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('form-message');
    btn.innerText = 'Sending...';
    btn.disabled = true;

    const formData = new FormData(this);
    fetch('/contact.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        msg.style.display = 'block';
        if (data.status === 'success') {
            msg.className = 'success-msg';
            msg.innerText = data.message;
            this.reset();
        } else {
            msg.className = 'error-msg';
            msg.innerText = data.message;
        }
        btn.innerText = 'Get a Free Quote';
        btn.disabled = false;
    })
    .catch(error => {
        msg.style.display = 'block';
        msg.className = 'error-msg';
        msg.innerText = 'Network error. Please try again later.';
        btn.innerText = 'Get a Free Quote';
        btn.disabled = false;
    });
});
</script>
